<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unique Product Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="gallery">
    <div class="product">
      <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?q=80&w=704&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Product 1" />
      <h2>Eco Bottle</h2>
      <p class="price">$19.99</p>
      <button>Buy Now</button>
    </div>
    <div class="product">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Product 2" />
      <h2>Stylish Backpack</h2>
      <p class="price">$49.99</p>
      <button>Buy Now</button>
    </div>
    <div class="product">
      <img src="https://images.unsplash.com/photo-1693621947585-7b7d94149af4?q=80&w=1193&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Product 3" />
      <h2>Smart Watch</h2>
      <p class="price">$89.99</p>
      <button>Buy Now</button>
    </div>
    <div class="product">
      <img src="https://images.unsplash.com/photo-1702471896991-d445358ee001?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Product 4" />
      <h2>Running Shoes</h2>
      <p class="price">$74.99</p>
      <button>Buy Now</button>
    </div>
  </main>
</body>
</html>
