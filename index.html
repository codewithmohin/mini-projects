<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple interactive counter app built with HTML, CSS, and JavaScript.">
    <title>Interactive Counter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/25/25231.png" />
</head>
<body>
    <h1>Simple Counter App</h1>
    <hr>
    <p>Use the buttons to increase or decrease the count.</p>
    <label for="counter">Current Count:</label>
    <div id="counter" aria-live="polite" tabindex="0">Count: 0</div>
    <button id="incrementBtn" title="Increase the count">+ Increment</button>
    <button id="decrementBtn">- Decrement</button>
    <div id="error-message" style="color:red;"></div>
    <!-- JavaScript for counter functionality -->
    <!-- Powered by https://chatgpt.com/ -->
    <script src="script.js"></script>
    <footer>
      <p>&copy; 2025 Simple Counter App</p>
    </footer>
  </body>
</html>
